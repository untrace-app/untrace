<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#ffedcd" />
    <title>Untrace</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@500;600;700&family=Manrope:wght@400;500&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #ffedcd; }
      canvas { display: block; position: relative; z-index: 1; background: transparent; }
      #ui { position: fixed; inset: 0; pointer-events: none; z-index: 2; }
      #ui > * { pointer-events: auto; }
    </style>
  </head>
  <body>
    <canvas id="game-canvas"></canvas>
    <div id="board-bg" style="position:absolute;background:#f7e6ca;border-radius:20px;display:none;pointer-events:none;z-index:0;"></div>
    <div id="ui"></div>
    <div id="splash" style="position:fixed;inset:0;background:#f8f6f2;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding-top:28vh;">
      <img id="splash-logo" src="/untrace-logo.svg" alt="Untrace" style="max-width:80%;height:auto;opacity:0;transition:opacity 0.4s ease;" />
      <p id="splash-sub" style="font-family:'Manrope',system-ui,sans-serif;font-size:14px;font-weight:400;color:#888780;letter-spacing:0.1em;text-transform:uppercase;margin:16px 0 0;opacity:0;transition:opacity 0.4s ease;">a line puzzle</p>
      <div id="splash-loader" style="margin-top:24px;width:8px;height:8px;border-radius:50%;background:#888780;opacity:0;transition:opacity 0.3s ease;"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
