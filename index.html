<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Untrace</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700&family=Manrope:wght@400;500&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #f8f6f2; }
      canvas { display: block; position: relative; z-index: 1; background: transparent; }
      #ui { position: fixed; inset: 0; pointer-events: none; z-index: 2; }
      #ui > * { pointer-events: auto; }
    </style>
  </head>
  <body>
    <canvas id="game-canvas"></canvas>
    <div id="board-bg" style="position:absolute;background:#e9e8e4;border-radius:20px;display:none;pointer-events:none;z-index:0;"></div>
    <div id="ui"></div>
    <div id="splash" style="position:fixed;inset:0;background:#f8f6f2;z-index:9999;"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
