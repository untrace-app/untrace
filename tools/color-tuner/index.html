<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family:'Manrope',system-ui,sans-serif;
  background:#141414;
  color:#e0e0e0;
  display:flex;
  flex-direction:column;
  height:100vh;
  overflow:hidden;
}

/* ── Header / Tab bar ─────────────────────────────────────────── */
#header {
  background:#0e0e0e;
  border-bottom:1px solid #2a2a2a;
  padding:0 16px;
  display:flex;
  align-items:center;
  height:46px;
  flex-shrink:0;
  gap:0;
}
#header h1 {
  font-family:'Lexend',sans-serif;
  font-size:12px; font-weight:700;
  color:#666; text-transform:uppercase;
  letter-spacing:0.14em;
  margin-right:20px; flex-shrink:0;
}
#tab-bar { display:flex; gap:2px; height:100%; align-items:center; }
.tab-btn {
  padding:0 13px; height:30px;
  border:none; border-radius:6px;
  font-size:11px; font-weight:600; cursor:pointer;
  font-family:'Manrope',sans-serif;
  background:transparent; color:#555;
  transition:all 0.12s; white-space:nowrap;
}
.tab-btn.active  { background:#252525; color:#e0e0e0; }
.tab-btn:hover:not(.active) { color:#999; }

/* ── Main layout ──────────────────────────────────────────────── */
#main { flex:1; display:flex; overflow:hidden; }

/* ── Preview ──────────────────────────────────────────────────── */
#preview {
  flex:1;
  display:flex;
  align-items:flex-start;
  justify-content:center;
  overflow-y:auto;
  padding:24px;
  background:#111;
}
.screen-mock {
  display:none;
  width:375px;
  border-radius:22px;
  overflow:hidden;
  box-shadow:0 20px 60px rgba(0,0,0,0.7);
  flex-shrink:0;
  position:relative;
}
.screen-mock.active { display:block; }

/* ── Controls ─────────────────────────────────────────────────── */
#controls {
  width:272px;
  background:#1a1a1a;
  overflow-y:auto;
  padding:14px 14px 6px;
  display:flex;
  flex-direction:column;
  gap:3px;
  border-left:1px solid #272727;
  flex-shrink:0;
}
#controls-title {
  font-family:'Lexend',sans-serif;
  font-size:11px; font-weight:700;
  color:#666; text-transform:uppercase;
  letter-spacing:0.14em;
  margin-bottom:8px; display:block;
}
.screen-pickers { display:none; }
.screen-pickers.active { display:block; }
.sec-label {
  font-size:9px; font-weight:700; color:#484848;
  text-transform:uppercase; letter-spacing:0.1em;
  margin:10px 0 3px;
  padding-bottom:3px;
  border-bottom:1px solid #242424;
}
.color-row {
  display:flex; align-items:center; gap:6px; height:25px;
}
.color-row label {
  flex:1; font-size:11px; color:#999;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.color-row input[type="color"] {
  width:24px; height:18px;
  border:1px solid #383838; border-radius:3px;
  cursor:pointer; padding:0; background:none; flex-shrink:0;
}
.hex-val {
  font-size:10px; color:#555; font-family:monospace;
  width:52px; text-align:right; flex-shrink:0;
}
#btn-row {
  display:flex; gap:6px;
  margin-top:10px; padding-top:10px;
  border-top:1px solid #242424; flex-shrink:0;
}
#btn-row button {
  flex:1; padding:8px 0; border:none; border-radius:6px;
  font-size:11px; font-weight:700; cursor:pointer;
  font-family:'Manrope',sans-serif;
}
#btn-export { background:#b83c2c; color:#fff; }
#btn-reset  { background:#2e2e2e; color:#aaa; }
#export-output {
  width:100%; height:88px; margin-top:6px;
  background:#0e0e0e; color:#888;
  border:1px solid #242424; border-radius:5px;
  padding:7px; font-size:10px;
  font-family:monospace; resize:vertical;
}

function starSVG(size, fill1, fill2, border, idx) {
  const gid = `sg-${idx}`;
  return `<svg width="${size}" height="${size}" viewBox="-3 -21 582 536" overflow="visible">`
    + `<defs><radialGradient id="${gid}" cx="50%" cy="30%" r="65%">`
    + `<stop offset="0%" stop-color="${fill1}"/>`
    + `<stop offset="100%" stop-color="${fill2}"/>`
    + `</radialGradient></defs>`
    + `<path d="${FA_STAR}" fill="url(#${gid})" stroke="${border}" stroke-width="4" vector-effect="non-scaling-stroke"/>`
    + `</svg>`;
}

function emptyStarSVG(size, fill, border, idx) {
  return `<svg width="${size}" height="${size}" viewBox="-3 -21 582 536" overflow="visible">`

const C = JSON.parse(JSON.stringify(DEFAULTS));

// ── Picker inputs registry ────────────────────────────────────────────
const pickerInputs = {}; // key: 'screen.colorKey' → { input, hexSpan }

// ── Build all pickers ─────────────────────────────────────────────────
function buildPickers() {
  for (const [screen, cfg] of Object.entries(SCREEN_CONFIG)) {
    const container = document.getElementById(`pickers-${screen}`);
    for (const { label, keys } of cfg.sections) {
      const sec = document.createElement('div');
      sec.className = 'sec-label';
      sec.textContent = label;
      container.appendChild(sec);
      for (const key of keys) {
        const row = document.createElement('div');
        row.className = 'color-row';
        const lbl = document.createElement('label');
        lbl.textContent = cfg.labels[key] || key;
        const input = document.createElement('input');
        input.type = 'color';
        input.value = C[screen][key];
        const hexSpan = document.createElement('span');
        hexSpan.className = 'hex-val';
        hexSpan.textContent = C[screen][key];
        input.addEventListener('input', () => {
          C[screen][key] = input.value;
          hexSpan.textContent = input.value;
          updateMock(screen);
        });
        pickerInputs[`${screen}.${key}`] = { input, hexSpan };
        row.append(lbl, input, hexSpan);
        container.appendChild(row);
      }
    }
  }
}

function buildLevelSelectMock() {
  // Node positions (cx, cy) for 5 nodes in a winding layout
  const nodes = [
    { x:140, y:88,  state:'completed3' },
    { x:248, y:188, state:'completed2' },
    { x:110, y:288, state:'active'     },
    { x:238, y:388, state:'unlocked'   },
    { x:120, y:480, state:'locked'     },
  ];
  const R = 32; // node radius

  // Build SVG lines
  let svgLines = `<svg id="ls-svg" style="position:absolute;top:0;left:0;width:100%;height:560px;pointer-events:none;">
  <defs>
    <linearGradient id="ls-lgrad" gradientUnits="userSpaceOnUse" x1="0" y1="${nodes[0].y}" x2="0" y2="${nodes[nodes.length-1].y}">
      <stop id="ls-gs1" offset="0%"  />
      <stop id="ls-gs2" offset="100%"/>
    </linearGradient>
  </defs>`;
  for (let i = 0; i < nodes.length - 1; i++) {
    const a = nodes[i], b = nodes[i+1];

// ── Canvas drawing (Game Board) ───────────────────────────────────────
const GRID = 3, SPACING = 82, DOT_R = 9, LINE_W = 6;

function getOrigin(W, H) {
  return {
    ox: (W - SPACING * (GRID - 1)) / 2,
    oy: (H - SPACING * (GRID - 1)) / 2,
  };
}

function gtp(col, row, ox, oy) {
  return { x: ox + col * SPACING, y: oy + row * SPACING };
}

const LAYER_KEYS = ['','layer1','layer2','layer3','layer4','layer5'];

const CONNECTIONS = [
  [0,0, 1,0, 1],
  [1,0, 2,0, 2],
  [0,1, 1,1, 3],
  [1,1, 2,1, 4],
  [0,2, 1,2, 5],
  [0,0, 0,1, 1],
  [2,1, 2,2, 2],
];

function drawCanvasForColors(canvasId, c, W, H) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, W, H);
  const { ox, oy } = getOrigin(W, H);

  for (const [c1,r1,c2,r2,layers] of CONNECTIONS) {
    if (!layers) continue;
    const a = gtp(c1,r1,ox,oy), b = gtp(c2,r2,ox,oy);
    const color = c[LAYER_KEYS[layers]] || c.layer1;
    const width = LINE_W + (layers - 1) * 1.5;
    ctx.strokeStyle = color; ctx.lineWidth = width; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke();
  }

  for (let col = 0; col < GRID; col++) {
    for (let row = 0; row < GRID; row++) {
      const { x, y } = gtp(col,row,ox,oy);
      const isActive = col === 2 && row === 2;
      ctx.beginPath(); ctx.arc(x, y, DOT_R, 0, Math.PI*2);
      ctx.fillStyle = isActive ? c.dotActive : c.dotInactive;
      ctx.fill();
      if (isActive) {
        ctx.save(); ctx.globalAlpha = 0.25;
        ctx.beginPath(); ctx.arc(x, y, DOT_R * 1.9, 0, Math.PI*2);
        ctx.fillStyle = c.dotActive; ctx.fill(); ctx.restore();
      }
    }
  }
}

function drawBoardCanvas()    { drawCanvasForColors('game-canvas', C.board, 260, 260); }
function drawTutorialCanvas() { drawCanvasForColors('tut-canvas',  C.board, 200, 200); }

// ── Tab switching ─────────────────────────────────────────────────────
let currentScreen = 'board';

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const screen = btn.dataset.screen;
    if (screen === currentScreen) return;
    currentScreen = screen;
    // Tabs
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b === btn));
    // Mocks
    document.querySelectorAll('.screen-mock').forEach(m =>
      m.classList.toggle('active', m.id === `mock-${screen}`));
    // Pickers
    document.querySelectorAll('.screen-pickers').forEach(p =>
      p.classList.toggle('active', p.id === `pickers-${screen}`));
    // Title
    document.getElementById('controls-title').textContent = SCREEN_CONFIG[screen].title;
  });
});

// ── Export ────────────────────────────────────────────────────────────
document.getElementById('btn-export').addEventListener('click', () => {
  const json = JSON.stringify(C, null, 2);
  document.getElementById('export-output').value = json;
  navigator.clipboard.writeText(json).catch(() => {});
});

// ── Reset ─────────────────────────────────────────────────────────────
document.getElementById('btn-reset').addEventListener('click', () => {
  const fresh = JSON.parse(JSON.stringify(DEFAULTS));
  for (const screen of Object.keys(DEFAULTS)) {
    for (const key of Object.keys(DEFAULTS[screen])) {
      C[screen][key] = fresh[screen][key];
      const ref = pickerInputs[`${screen}.${key}`];
      if (ref) { ref.input.value = fresh[screen][key]; ref.hexSpan.textContent = fresh[screen][key]; }
    }
  }
  updateAll();
});

// ── Init ──────────────────────────────────────────────────────────────
buildBoardMock();
buildSplashMock();
buildLevelSelectMock();
buildCelebrationMock();
buildSettingsMock();
buildTutorialMock();
buildPickers();
updateAll();
</script>
